<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4D4D4"/>
      <stop offset="40%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#A8A8A8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBE9DC"/>
      <stop offset="100%" stop-color="#E0DED1"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
  </defs>
  <!-- Background fills entire area for maskable safe zone -->
  <rect width="512" height="512" fill="#1A1A1A"/>
  <!-- iPod body — inset further for maskable safe zone (10% padding each side) -->
  <rect x="166" y="86" width="180" height="340" rx="20" fill="url(#body)" stroke="#999" stroke-width="2"/>
  <!-- Screen -->
  <rect x="190" y="112" width="132" height="100" rx="6" fill="url(#screen)" stroke="#B0B0B0" stroke-width="1"/>
  <!-- Click wheel -->
  <circle cx="256" cy="310" r="66" fill="url(#wheel)" stroke="#C8C8C8" stroke-width="1.5"/>
  <!-- Center button -->
  <circle cx="256" cy="310" r="24" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="1"/>
</svg>
